model:
  default: "GLM-5.1"
  providers:
    - name: openai
      api_key_env: OPENAI_API_KEY
    - name: claude
      api_key_env: ANTHROPIC_API_KEY
    - name: glm
      api_key_env: GLM_API_KEY
    - name: minimax
      api_key_env: MINIMAX_API_KEY

executor:
  scheduler_workers: 3
  execution_workers: 3
  default_timeout: 300

memory:
  token_budget: 500
  decay_days: 30
  decay_factor: 0.8
  min_confidence: 0.7
  max_facts: 50

skills:
  dirs:
    - skills/
  hot_reload: true

compaction:
  strategy: "smart"              # "truncate" (original) or "smart" (Deep Agent SDK)
  max_messages: 4                # trigger threshold (ultra-low for testing; production: 30)
  retention_window: 3            # tail messages kept verbatim
  summary_model: "glm-4-flash"   # cheap + fast model for summarization
  summary_max_chars: 800         # rolling summary length cap

graph:
  max_iterations: 3
